<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="assets/favicon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="styles/darkMode.css" />

    <!--Font Awesome-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!--JS files-->
    <script src="utils/easterEggFunction.js"></script>
    <script type="module" src="script.js" defer></script>
    <script src="utils/htmlConstants.js" defer></script>
    <script type="module" src="js/keyboardShortcuts.js" defer></script>
    <script type="module" src="js/handleTheme.js" defer></script>
    <script src="js/createLocalStorageVariables.js" defer></script>

    <title>Music Player :)</title>
  </head>
  <body>
    <div id="container">
      <div class="img_wrapper">
        <div id="music_id_display"></div>
        <img
          src="assets/music1.jpg"
          id="music_album_cover"
          alt="Music Album Cover"
        />
      </div>
      <div class="music_details">
        <div id="recommended_by_display" class="control_music_btn"></div>
        <h2 id="music_name_display"></h2>
        <p id="composer_display"></p>
      </div>
      <div class="music_controller_wrapper">
        <p style="text-align: center" class="maintence">Em manutenção :)</p>
        <span class="maintence" style="font-size: 0.85rem; text-align: center"
          >se quiser selecionar músicas abra as configurações e selecione o
          album "default"</span
        >
        <div id="progress_bar_wrapper">
          <div id="progress_bar"></div>
        </div>
        <div class="controls">
          <div class="control_music_index_wrapper">
            <button id="backwards" class="control_music_btn">
              <i
                class="fa-solid fa-backward-step"
                style="color: rgb(255, 255, 255)"
              ></i>
            </button>
            <button id="play_btn" class="control_music_btn">
              <i class="fa-solid fa-play" style="color: rgb(255, 255, 255)"></i>
            </button>
            <button id="forwards" class="control_music_btn">
              <i
                class="fa-solid fa-forward-step"
                style="color: rgb(255, 255, 255)"
              ></i>
            </button>
          </div>
          <p id="timestamp">0:00/0:00</p>
          <button id="loop_btn" class="control_music_btn">
            <i class="fa-solid fa-repeat" style="color: rgb(255, 255, 255)"></i>
          </button>
        </div>
      </div>

      <div id="configs_wrapper">
        <header>
          <div class="divider_line"></div>
          <div class="header_config_container">
            <p>
              <i class="fa-solid fa-gear"></i>
              Configurações
            </p>
            <button id="toggle_configs_btn">
              <i
                class="fa-solid fa-angle-down"
                style="color: rgb(255, 255, 255)"
              ></i>
            </button>
          </div>
        </header>

        <div id="configs_container">
          <div class="change_theme_wrapper">
            <label class="change_theme_btn_wrapper" for="theme_switcher_btn">
              <input type="checkbox" id="theme_switcher_btn" />
              <i class="icon-moon fa-solid fa-moon"></i>
              <i class="icon-sun fa-solid fa-sun"></i>
            </label>
            <span>|</span>
            <p id="current_theme_display"></p>
          </div>

          <div class="albuns_wrapper">
            <h2>Álbuns</h2>

            <div class="albuns_grid">
              <div class="albun" id="default_albun">
                <div class="albun_img">
                  <i class="fa-brands fa-itunes-note"></i>
                </div>
                <p>Default</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
