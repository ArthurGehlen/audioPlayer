<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- <script type="module" src="constants.js"></script> -->
    <script type="module" src="script.js" defer></script>
    <script src="utils/htmlConstants.js" defer></script>
    <title>Music Player :)</title>
  </head>
  <body>
    <div id="container">
      <div class="img_wrapper">
        <div id="music_id_display"></div>
        <img
          src="assets/music1.jpg"
          id="music_album_cover"
          alt="Music Album Cover"
        />
      </div>
      <div class="music_details">
        <h2 id="music_name_display"></h2>
        <p id="composer_display"></p>
      </div>
      <div class="music_controller_wrapper">
        <div id="progress_bar_wrapper">
          <div id="progress_bar"></div>
        </div>
        <div class="controls">
          <button id="play_btn" class="control_music_btn">
            <i class="fa-solid fa-play" style="color: rgb(255, 255, 255)"></i>
          </button>
          <div class="control_music_index_wrapper">
            <button id="backwards" class="control_music_btn">
              <i
                class="fa-solid fa-backward-step"
                style="color: rgb(255, 255, 255)"
              ></i>
            </button>
            <button id="forwards" class="control_music_btn">
              <i
                class="fa-solid fa-forward-step"
                style="color: rgb(255, 255, 255)"
              ></i>
            </button>
          </div>
          <p id="timestamp"></p>
        </div>
      </div>
    </div>
  </body>
</html>
